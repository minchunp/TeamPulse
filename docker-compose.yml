version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: teampulse-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - teampulse-network

  redis:
    image: redis:alpine
    container_name: teampulse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --loglevel warning
    networks:
      - teampulse-network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  teampulse-network:
    driver: bridge
